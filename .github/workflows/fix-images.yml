name: Corregir Imágenes Blog
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Ejecutar fix de imágenes
        run: node scripts/fix-images.mjs
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      - name: Commit y push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/extendedBlog.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "fix: imágenes coherentes con temática de cada artículo"
            git pull --rebase origin main
            git push
          else
            echo "Sin cambios que guardar"
          fi
