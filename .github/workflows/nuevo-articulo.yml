name: Nuevo Artículo Automático

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-article.mjs'

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || contains(github.event.head_commit.message, 'update script')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar artículo
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          echo "Iniciando generación..."
          node scripts/generate-article.mjs
          echo "Generación completada"

      - name: Verificar integridad de imágenes
        run: |
          node -e "
          const articles = JSON.parse(require('fs').readFileSync('src/data/extendedBlog.json','utf8'));
          const sinImagen = articles.filter(a => !a.image || a.image.length < 10);
          if(sinImagen.length > 0) {
            console.log('⚠️ Artículos sin imagen:', sinImagen.map(a=>a.title));
          } else {
            console.log('✅ Todas las imágenes OK:', articles.length, 'artículos');
          }
          "

      - name: Commit y Push de cambios
        run: |
          git config --global user.name 'GeoVerde Bot'
          git config --global user.email 'bot@geoverde.com'
          git add src/data/extendedBlog.json
          git commit -m "feat: nuevo artículo automatizado" || echo "No hay cambios para commitear"
          git push origin main
