name: Nuevo Artículo Automático

on:
  schedule:
    - cron: '0 0 */5 * *' # Se ejecuta los días 1, 6, 11, 16, 21, 26 de cada mes
  workflow_dispatch: # Permite ejecución manual para pruebas

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar Nuevo Artículo con Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: Commit y Push de cambios
        run: |
          git config --global user.name 'GeoVerde Bot'
          git config --global user.email 'bot@geoverde.com'
          git add src/data/extendedBlog.json
          git commit -m "feat: nuevo artículo automatizado" || echo "No hay cambios para commitear"
          git push origin main
